<style>
    .active { color: green; }
</style>
<canvas id='canvas' width='1200' height='800' style='border: 1px solid grey'></canvas>
<div>
<button id='addPointBtn'>Add Point</button>
<button id='movePointBtn'>Move Point</button>
<button id='removePointBtn'>Remove Point</button>
<button id='addSegmentBtn'>Add Segment</button>
<button id='removeSegmentBtn'>Remove Segment</button>
<button id='moveEllipseBtn'>Move Ellipse</button>
<button id='testBtn'>Test</button>
<button id='modeBtn'>Mode</button>
</div>
<script>
    class Vec2 {
        constructor(x = 0, y = 0) {
            this.x = x;
            this.y = y;
        }

        add(v)    { return new Vec2(this.x + v.x, this.y + v.y); }
        sub(v)    { return new Vec2(this.x - v.x, this.y - v.y); }
        mult(v)     { return new Vec2(this.x * v.x, this.y * v.y); }
        div(v)     { return new Vec2(this.x / v.x, this.y / v.y); }
        scale(s)  { return new Vec2(this.x * s,   this.y * s);   }
        length()  { return Math.sqrt(this.x ** 2 + this.y ** 2); }
        norm()    { const l = this.length(); return l > 0 ? this.scale(1 / l) : new Vec2(); }
        dot(v)    { return this.x * v.x + this.y * v.y; }
        clone()   { return new Vec2(this.x, this.y); }
        left()    { return new Vec2(this.y, -this.x); }

        toString() { return `Vec2(${this.x.toFixed(2)}, ${this.y.toFixed(2)})`; }
    }
</script>
<script>
    const POINT_RADIUS = 4;
    const POINT_RADIUS_HOVERED = 8;
    const SEGMENT_WIDTH = 2;
    const SEGMENT_WIDTH_HOVERED = 4;
    const ELLIPSE_A = 200 * Math.sqrt(2);
    const ELLIPSE_B = 200;
    const ELLIPSE_WIDTH = 3;
    const ELLIPSE_RADIUSES = new Vec2(ELLIPSE_A, ELLIPSE_B);
    
    var DEBUG_MODE = 0;
    
    var clickEventListener = null;
    var moveEventListener = null;
    function setClickEventListener(listener) {
        if (clickEventListener) {
            canvas.removeEventListener('click', clickEventListener);
        }
        clickEventListener = listener;
        if (clickEventListener) {
            canvas.addEventListener('click', clickEventListener);
        }
    }
    function setMoveEventListener(listener) {
        if (moveEventListener) {
            canvas.removeEventListener('mousemove', moveEventListener);
        }
        moveEventListener = listener;
        if (moveEventListener) {
            canvas.addEventListener('mousemove', moveEventListener);
        }
    }
    var activeActionBtn = null;
    function setActiveAction(btn) {
        if (activeActionBtn) {
            activeActionBtn.classList.remove('active');
        }
        activeActionBtn = btn;
        if (activeActionBtn) {
            activeActionBtn.classList.add('active');
        }
    }
    
    var ctx = canvas.getContext('2d');
    var ellipse = new Vec2(canvas.width / 2, canvas.height / 2);
    var points = [];
    var segments = [];
    var activePoint = -1;
    var hoveredPoint = -1;
    var hoveredSegment = -1;
    var activeSegment = -1;
    
    function newton(f, kMin, kMax) {
        while (Math.abs(kMax - kMin) > 0.0001) {
            const k = (kMin + kMax) * 0.5;
            if (f(k) > 0) {
                kMax = k;
            }
            else {
                kMin = k;
            }
        }
        return (kMin + kMax) * 0.5;
    }
    
    function findEllipsoidNearestPoints(p, r) {
        // f(k) = sum(p0[i]/(r[i]^2*(1+k/r[i]^2)^2)) - 1
        // f'(k) = -2*sum(p[i]^2/(a[i]^4*(1+k/a[i]^2)^3))
        
        const f = (k) => {
            return (p.x**2) / (r.x**2*(1+k/r.x**2)**2) + (p.y**2) / (r.y**2*(1+k/r.y**2)**2) - 1;
        };
        
        const g = (k) => {
            return -2 * (p.x**2 / (r.x**4*(1+k/r.x**2)**3) + p.y**2 / (r.y**4*(1+k/r.y**2)**3));
        };
        
        const bk1 = Math.min(-(r.x**2), -(r.y**2));
        const bk3 = Math.max(-(r.x**2), -(r.y**2));
        var bk0 = bk1 - 1;
        while (f(bk0) > 0) { bk0 -= (bk1 - bk0); }
        var bk4 = bk3 + 1;
        while (f(bk4) > 0) { bk4 += (bk4 - bk3); }
        var tk1 = bk1 + 0.5 * (bk3 - bk1);
        while (g(tk1) > 0) { tk1 = bk1 + 0.5 * (tk1 - bk1); }
        var tk3 = bk3 - 0.5 * (bk3 - bk1);
        while (g(tk3) > 0) { tk3 = bk3 - 0.5 * (bk3 - tk3); }
        var bk2 = newton(g, tk1, tk3);
        
        var ks = [];
        ks.push(newton(f, bk0, bk1));
        if (f(bk2) < 0) {
            ks.push(newton(f, bk2, bk1));
            ks.push(newton(f, bk2, bk3));
        }
        ks.push(newton(f, bk4, bk3));
        
        return ks.map((k) => new Vec2(p.x/(1+k/r.x**2), p.y/(1+k/r.y**2)));
    }
    
    
    
    function findContact() {
        var nearestDist = 0.0;
        var nearestSegmentPoint = null;
        var nearestEllipsePoint = null;
        var contactColor = 'orange';
        var otherEllipsePoint = [];
        for (var s = 0; s < segments.length; ++s) {
            var a = points[segments[s][0]].sub(ellipse);
            var b = points[segments[s][1]].sub(ellipse);
            var n = b.sub(a).norm().left();
            if (n.dot(a.scale(-1)) < 0.0) {
                continue;
            }
            
            const ned = new Vec2(n.x * ELLIPSE_A * ELLIPSE_A, n.y * ELLIPSE_B * ELLIPSE_B);
            const nep = ned.scale(-1.0/Math.sqrt(ned.dot(n)));
            const nd = nep.sub(a).dot(n);
            const ntp = nep.sub(n.scale(nd));
            
            const ttp = Math.max(0, Math.min(ntp.sub(a).dot(b.sub(a)) / (b.sub(a).dot(b.sub(a))), 1));
            const tp = a.add(b.sub(a).scale(ttp));
            
            var color = 'green';
            var ep = nep;
            
            var eps = [];
            if (DEBUG_MODE == 0)
            {
                if (tp.sub(ntp).length() > 0.001) {
                    color = 'orange';
                    var ps = findEllipsoidNearestPoints(tp, ELLIPSE_RADIUSES);
                    if (tp.sub(a).length() < tp.sub(b).length()) {
                        ps = ps.filter(p => (a.sub(b).dot(p.sub(tp)) <= 0) && (n.dot(p.sub(tp)) <= 0));
                    }
                    else {
                        ps = ps.filter(p => (b.sub(a).dot(p.sub(tp)) <= 0) && (n.dot(p.sub(tp)) <= 0));
                    }
                    ep = ps[0];
                    for (var k = 1; k < ps.length; ++k) {
                        if (ep.sub(tp).length() > ps[k].sub(tp).length()) {
                            ep = ps[k];
                        }
                    }
                }
            }
            else
            {
                if (tp.sub(ntp).length() > 0.001) {
                    color = 'orange';
                    const r2 = ELLIPSE_RADIUSES.mult(ELLIPSE_RADIUSES);
                    const p2 = tp.mult(tp);
                    const computeError = (lambda) => {
                        const dsqrt = r2.add(new Vec2(lambda, lambda));
                        const t = p2.mult(r2).div(dsqrt.mult(dsqrt));
                        return t.x + t.y - 1.0;
                    };
                    var lambdaMin = -Math.min(r2.x, r2.y);
                    var lambdaMax = 0.0;
                    var eps = [];
                    for (var i = 0; i <= 20; ++i) {
                        var lambda = lambdaMin + (lambdaMax - lambdaMin) * (i / 20);
                        //eps.push(tp.mult(r2).div(r2.add(new Vec2(lambda, lambda))).add(ellipse));
                    }
                    while (lambdaMax - lambdaMin > 1) {
                        const lambda = (lambdaMin + lambdaMax) * 0.5;
                        const error = computeError(lambda);
                        if (DEBUG_MODE == 2)
                            eps.push(tp.mult(r2).div(r2.add(new Vec2(lambda, lambda))).add(ellipse));
                        if (error < 0.0) {
                            lambdaMax = lambda;
                        }
                        else {
                            lambdaMin = lambda;
                        }
                    }
                    const rLambda = (lambdaMin + lambdaMax) * 0.5;
                    var ep = tp.mult(r2).div(r2.add(new Vec2(rLambda, rLambda)));
                }
            }
           
            if (tp.div(ELLIPSE_RADIUSES).length() >= 1) {
                continue;
            }
            
            
            const dist = -tp.sub(ep).length();
            if (dist < nearestDist) {
                nearestDist = dist;
                nearestSegmentPoint = tp.add(ellipse);
                nearestEllipsePoint = ep.add(ellipse);
                otherEllipsePoint = eps;
                contactColor = color;
                activeSegment = s;
            }
        }
        
        if (nearestEllipsePoint) {
            return [nearestEllipsePoint, nearestSegmentPoint, otherEllipsePoint, contactColor];
        }
        activeSegment = -1;
        return null;
    }
    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        segments.forEach((segment, index) => {
            ctx.beginPath();
            const p0 = points[segment[0]];
            const p1 = points[segment[1]];
            const m = p0.add(p1).scale(0.5);
            const d = p1.sub(p0).norm().scale(10);
            const n = d.left();
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.moveTo(m.sub(d).x, m.sub(d).y);
            ctx.lineTo(m.sub(d).sub(d).sub(n).x, m.sub(d).sub(d).sub(n).y);
            ctx.moveTo(m.x, m.y);
            ctx.lineTo(m.sub(d).sub(n).x, m.sub(d).sub(n).y);
            ctx.moveTo(m.add(d).x, m.add(d).y);
            ctx.lineTo(m.sub(n).x, m.sub(n).y);
            ctx.strokeStyle = index == activeSegment ? 'red' : 'black';
            ctx.lineWidth = index == hoveredSegment ? SEGMENT_WIDTH_HOVERED : SEGMENT_WIDTH;
            ctx.stroke();
        });
        points.forEach((point, index) => {
            ctx.beginPath();
            ctx.arc(point.x, point.y, index == hoveredPoint ? POINT_RADIUS_HOVERED : POINT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = index == activePoint ? 'red' : 'black';
            ctx.fill();
        });
        
        ctx.beginPath();
        ctx.ellipse(ellipse.x, ellipse.y, ELLIPSE_A, ELLIPSE_B, 0, 0, Math.PI * 2);
        ctx.strokeStyle = 'blue';
        ctx.lineWidth = ELLIPSE_WIDTH;
        ctx.stroke();
        
        const contact = findContact();
        if (contact) {
            ctx.beginPath();
            ctx.moveTo(contact[0].x, contact[0].y);
            ctx.lineTo(contact[1].x, contact[1].y);
            ctx.strokeStyle = contact[3];
            ctx.lineWidth = 1;
            ctx.stroke();
            if (contact[2].length > 0) {
                ctx.beginPath();
                ctx.moveTo(contact[1].x, contact[1].y);
                for (var i = 0; i < contact[2].length; ++i) {
                    ctx.lineTo(contact[2][i].x, contact[2][i].y);
                    ctx.arc(contact[2][i].x, contact[2][i].y, (contact[2].length-i)*0.5+2, 0, Math.PI * 2);
                    ctx.moveTo(contact[2][i].x, contact[2][i].y);
                }
                ctx.strokeStyle = 'green';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
    }
    function findPointIndexAtPosition(pos) {
        return points.findIndex(point => { return pos.sub(point).length() <= POINT_RADIUS_HOVERED; });
    }
    function findSegmentIndexAtPosition(pos) {
        return segments.findIndex(segment => {
            const a = points[segment[0]];
            const b = points[segment[1]];
            const ab = b.sub(a);
            const ap = pos.sub(a);
            const t = Math.max(0, Math.min(ap.dot(ab) / ab.dot(ab), 1));
            const c = a.add(ab.scale(t));
            return pos.sub(c).length() <= SEGMENT_WIDTH_HOVERED;
        });
    }
    function removePoint(p) {
        segments = segments.filter(s => s[0] != p && s[1] != p);
        for (var s = 0; s < segments.length; ++s) {
            if (segments[s][0] > p) {
                --segments[s][0];
            }
            if (segments[s][1] > p) {
                --segments[s][1];
            }
        }
        points.splice(p, 1);
    }
    
    
    function getEventPosition(e) {
        const rect = canvas.getBoundingClientRect();
        return new Vec2(e.clientX - rect.left, e.clientY - rect.top);
    }
    
    addPointBtn.addEventListener('click', () => {
        setActiveAction(addPointBtn);
        setClickEventListener((e) => {
            const p = getEventPosition(e);
            points.push(p);
            drawScene();
        });
        setMoveEventListener(null);
    });
    
    removePointBtn.addEventListener('click', () => {
        setActiveAction(removePointBtn);
        setClickEventListener((e) => {
            const pos = getEventPosition(e);
            const p = findPointIndexAtPosition(pos);
            if (p != -1) {
                removePoint(p);
                hoveredPoint = -1;
            }
            drawScene();
        });
        setMoveEventListener((e) => {
            const pos = getEventPosition(e);
            hoveredPoint = findPointIndexAtPosition(pos);
            drawScene();
        });
        
    });
    
    movePointBtn.addEventListener('click', () => {
        setActiveAction(movePointBtn);
        
        var isMoving = false;
        
        setClickEventListener((e) => {
            const pos = getEventPosition(e);
            const p = findPointIndexAtPosition(pos);
            if (!isMoving && p != -1) {
                activePoint = p;
                isMoving = true;
            }
            else {
                points[activePoint] = pos;
                isMoving = false;
            }
            drawScene();
        });
        
        setMoveEventListener((e) => {
            const p = getEventPosition(e);
            if (isMoving) {
                const pos = getEventPosition(e);
                points[activePoint] = pos;
            }
            else {
                hoveredPoint = findPointIndexAtPosition(p);
            }
            drawScene();
        });
    });
    
    addSegmentBtn.addEventListener('click', () => {
        setActiveAction(addSegmentBtn);
        
        setClickEventListener((e) => {
            const pos = getEventPosition(e);
            const p = findPointIndexAtPosition(pos);
            if (p == -1 || p == activePoint) {
                activePoint = -1;
            }
            else if (activePoint != -1) {
                segments.push([activePoint, p]);
                activePoint = -1;
            }
            else {
                activePoint = p;
            }
            drawScene();
        });
        
        setMoveEventListener((e) => {
            const p = getEventPosition(e);
            hoveredPoint = findPointIndexAtPosition(p);
            drawScene();
        });
    });
    
    removeSegmentBtn.addEventListener('click', () => {
        setActiveAction(removeSegmentBtn);
        
        setClickEventListener((e) => {
            const pos = getEventPosition(e);
            const s = findSegmentIndexAtPosition(pos);
            if (s != -1) {
                segments.splice(s, 1);
                hoveredSegment = -1;
            }
            drawScene();
        });
        
        setMoveEventListener((e) => {
            const pos = getEventPosition(e);
            hoveredSegment = findSegmentIndexAtPosition(pos);
            drawScene();
        });
    });
    
    moveEllipseBtn.addEventListener('click', () => {
        setActiveAction(moveEllipseBtn);
        
        var isMoving = false;
        
        setClickEventListener((e) => {
            isMoving = !isMoving;
            drawScene();
        });
        
        setMoveEventListener((e) => {
            if (isMoving) {
                const pos = getEventPosition(e);
                ellipse = pos;
                drawScene();
            }
        });
    });
    
    testBtn.addEventListener('click', () => {
        setActiveAction(testBtn);
        
        setClickEventListener(null);
        setMoveEventListener((e) => {
            drawScene();
            
            const pos = getEventPosition(e);
            const ps = findEllipsoidNearestPoints(pos.sub(ellipse), ELLIPSE_RADIUSES);
            ps.forEach(p => {
                p = p.add(ellipse);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
                ctx.strokeStyle = 'red';
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, p.sub(pos).length(), 0, 2*Math.PI);
                ctx.strokeStyle = 'grey';
                ctx.stroke();
            });
        });
    });
    
    modeBtn.addEventListener('click', () => { DEBUG_MODE = (DEBUG_MODE + 1) % 3; console.log('mode'); drawScene(); });
    
    moveEllipseBtn.click();
    points.push(new Vec2(400, 345));
    points.push(new Vec2(515, 745));
    segments.push([0, 1]);
    drawScene();
</script>
